server {
    listen 3000;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static files and fall back to index.html for SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the authentication service
    location /api/auth/ {
        proxy_pass http://identity-provider:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy API requests to the order-gateway service (Admin specific)
    location /api/gateway/ {
        proxy_pass http://order-gateway:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy API requests to the stock service
    location /api/stock/ {
        proxy_pass http://stock-service:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy API requests to the kitchen service
    location /api/kitchen/ {
        proxy_pass http://kitchen-service:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy API requests to the notification service
    location /api/notification/ {
        proxy_pass http://notification-service:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy API requests to the order-gateway service (Default)
    location /api/ {
        proxy_pass http://order-gateway:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy WebSocket connections to the notification service.
    # Using a variable for the upstream defers DNS resolution to runtime via
    # Docker's internal resolver (127.0.0.11), preventing nginx from crashing
    # at startup when the upstream container isn't yet available.
    # NOTE: When proxy_pass contains a variable, nginx passes the original
    # request URI unchanged — the path in the proxy_pass expression is ignored
    # for routing. Do NOT add /ws here or the backend sees /ws/ws (double path).
    location /ws {
        resolver 127.0.0.11 valid=30s;
        set $notification_upstream http://notification-service:8000;
        proxy_pass $notification_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        # Keep long-lived WebSocket connections alive (default nginx timeout is 60s)
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
