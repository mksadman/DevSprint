# =============================================================================
# IUT Cafeteria Crisis System — Docker Compose Orchestration
# =============================================================================
# Run with:  docker compose up --build
# =============================================================================

x-common-env: &common-env
  DATABASE_URL: postgresql://cafeteria:cafeteria_pass@postgres:5432/cafeteria_db
  REDIS_URL: redis://redis:6379/0
  RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
  JWT_SECRET: super-secret-hackathon-key
  INTERNAL_API_KEY: internal-service-key-2026
  # JSON array of allowed CORS origins. Add your deployed frontend URL here when going to production.
  CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173"]'

services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cafeteria
      POSTGRES_PASSWORD: cafeteria_pass
      POSTGRES_DB: cafeteria_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - cafeteria-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cafeteria -d cafeteria_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - cafeteria-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - cafeteria-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ---------------------------------------------------------------------------
  # Backend Microservices
  # ---------------------------------------------------------------------------
  identity-provider:
    build: ./backend/identity-provider
    ports:
      - "8001:8000"
    environment:
      <<: *common-env
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cafeteria-net

  order-gateway:
    build: ./backend/order-gateway
    ports:
      - "8000:8000"
    environment:
      <<: *common-env
      REDIS_HOST: redis
      REDIS_PORT: 6379
      STOCK_SERVICE_URL: http://stock-service:8000
      GATEWAY_TIMEOUT_MS: 5000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      identity-provider:
        condition: service_started
      stock-service:
        condition: service_started
      kitchen-service:
        condition: service_started
    networks:
      - cafeteria-net

  stock-service:
    build: ./backend/stock-service
    ports:
      - "8002:8000"
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cafeteria-net

  kitchen-service:
    build: ./backend/kitchen-service
    ports:
      - "8003:8000"
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - cafeteria-net

  notification-service:
    build: ./backend/notification-service
    ports:
      - "8004:8000"
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - cafeteria-net

  # ---------------------------------------------------------------------------
  # Frontend
  # ---------------------------------------------------------------------------
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - order-gateway
    networks:
      - cafeteria-net

# =============================================================================
# Networks & Volumes
# =============================================================================
networks:
  cafeteria-net:
    driver: bridge

volumes:
  pgdata:
