name: CI Pipeline

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  test-stock-service:
    name: Stock Service Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend/stock-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/stock-service/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run tests
        run: pytest test/ -v --tb=short

  test-kitchen-service:
    name: Kitchen Service Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend/kitchen-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/kitchen-service/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run tests
        run: pytest test/ -v --tb=short

  test-auth-service:
    name: Auth Service Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend/identity-provider

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/identity-provider/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run tests
        run: pytest tests/ -v --tb=short

  test-order-gateway:
    name: Order Gateway Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend/order-gateway

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/order-gateway/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run tests
        run: pytest tests/ -v --tb=short

  test-notification-service:
    name: Notification Service Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend/notification-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/notification-service/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run tests
        run: pytest tests/ -v --tb=short

  docker-build:
    name: Docker Compose Build
    runs-on: ubuntu-latest
    needs:
      [
        test-stock-service,
        test-kitchen-service,
        test-auth-service,
        test-order-gateway,
        test-notification-service,
      ]

    steps:
      - uses: actions/checkout@v4

      - name: Build all services
        run: docker compose build

      - name: Verify containers start
        run: |
          docker compose up -d
          # Wait for infrastructure health checks (postgres, redis, rabbitmq)
          echo "Waiting for services to become healthy..."
          sleep 30
          # Retry health checks with backoff
          for port in 8001 8002 8000 8004; do
            for i in 1 2 3 4 5; do
              if curl -sf http://localhost:$port/health > /dev/null 2>&1; then
                echo "localhost:$port/health — OK"
                break
              fi
              echo "Attempt $i: localhost:$port/health not ready, retrying in 10s..."
              sleep 10
            done
            curl -f http://localhost:$port/health || { docker compose logs; exit 1; }
          done
          docker compose down
